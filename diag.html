<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Diagnóstico</title></head>
<body style="background:#111;color:#fff;font:14px monospace;padding:20px">
<h2>TEST Proxy OpenAI - Diagnóstico</h2>
<pre id="out" style="background:#000;padding:10px"></pre>

<script>
var o=document.getElementById("out");
function L(t){o.textContent+=t+"\n";}

L("Iniciando prueba de diagnóstico...");
L("Llamando a proxy local en '/api/analyze'...");

var img=new Image();
img.onload=function(){
 var c=document.createElement("canvas");c.width=1;c.height=1;
 c.getContext("2d").drawImage(img,0,0);
 var b64=c.toDataURL("image/jpeg");
 L("Imagen test creada: "+b64.length+" chars");

 fetch("/api/analyze",{
  method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({
   image:b64
  })
 }).then(r=>{L("Status HTTP del Proxy: "+r.status); return r.json();})
 .then(d=>{
   if (d.error) {
     L("ERROR EN PROXY: " + JSON.stringify(d.error));
   } else {
     L("Modelo retornado por OpenAI: "+d.model);
     L("Respuesta cruda de OpenAI: "+(d.choices?d.choices[0].message.content:"ERROR: "+JSON.stringify(d)));
   }
 })
 .catch(e=>L("FETCH ERROR: "+e.message));
};
img.src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==";
</script>
</body>
</html>
